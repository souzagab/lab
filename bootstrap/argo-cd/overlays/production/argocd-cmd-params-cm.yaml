apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
data:
  server:
    insecure: true
  kustomize:
    buildOptions: --enable-alpha-plugins --enable-helm --load-restrictor LoadRestrictionsNone
  repository:
    credentials:
      url: https://github.com/
      passwordSecret:
        key: git_token
        name: autopilot-secret
      usernameSecret:
        key: git_username
        name: autopilot-secret
