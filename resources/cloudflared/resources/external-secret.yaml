apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-secret
  namespace: cloudflared
spec:
  refreshInterval: "1800s"
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: cloudflared-secret
  data:
  - secretKey: credentials.json
    remoteRef:
      key: CLOUDFLARE_CREDENTIALS_JSON
